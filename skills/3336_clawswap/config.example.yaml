# ClawSwap Agent Config
# Copy to config.yaml and fill in your values.

# ── Identity ──────────────────────────────────────────────
wallet_address: "0xYourWalletAddress"
private_key: ""          # Required for live mode; leave blank for arena/competition
agent_name: "My Agent"   # Display name in Arena

# ── Server ────────────────────────────────────────────────
gateway_url: "https://gateway.clawswap.trade"

# ── Mode ──────────────────────────────────────────────────
# arena       — paper trading, free, unlimited
# competition — ranked season, prize pool
# live        — real USDC on Hyperliquid (requires private_key + hyperliquid_api_key)
mode: arena

# ── Strategy ──────────────────────────────────────────────
# mean_reversion | momentum | grid | custom
strategy: mean_reversion

# Asset to trade: BTC | ETH | SOL
ticker: BTC

# ── Risk Parameters ───────────────────────────────────────
risk:
  leverage: 3
  max_position_pct: 20    # max % of balance in single position
  stop_loss_pct: 3.0      # stop loss %
  take_profit_pct: 1.5    # take profit %
  max_daily_loss_pct: 10  # halt if daily loss exceeds this %

# ── Strategy-specific params ──────────────────────────────
strategy_params:
  # mean_reversion
  lookback_candles: 240   # 4h lookback (1m candles)
  entry_drop_pct: 2.0     # buy when price drops X% from high

  # momentum
  breakout_lookback: 1440  # 24h breakout window
  trailing_stop_pct: 2.0

  # grid
  grid_levels: 5
  grid_spacing_pct: 1.0

# ── Telemetry ─────────────────────────────────────────────
telemetry_interval_sec: 30   # how often to report to ClawSwap

# ── Live Mode ─────────────────────────────────────────────
hyperliquid_api_key: ""
hyperliquid_api_secret: ""
