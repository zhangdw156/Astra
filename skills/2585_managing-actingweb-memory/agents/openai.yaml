interface:
  display_name: "ActingWeb Memory"
  short_description: "Personal memory system for AI assistants"
  icon_small: "./assets/actingweb-small.svg"
  icon_large: "./assets/actingweb.png"
  brand_color: "#3B82F6"
  default_prompt: "Use $skill-name to recall my preferences and save anything worth remembering from this session."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "actingweb"
      description: "ActingWeb personal memory MCP server"
      transport: "streamable_http"
      url: "https://ai.actingweb.io/mcp"
