services:
  parallel-1-0-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: parallel-1-0-1-mcp
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      - MCP_TRANSPORT=http
      - PARALLEL_API_BASE=http://localhost:8001
      - PARALLEL_API_KEY=mock-api-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# Usage:
# 1. Build: docker compose -f docker/docker-compose.yaml build
# 2. Start: docker compose -f docker/docker-compose.yaml up -d
# 3. Logs: docker compose -f docker/docker-compose.yaml logs -f
# 4. Stop: docker compose -f docker/docker-compose.yaml down
#
# MCP Server: http://localhost:8000