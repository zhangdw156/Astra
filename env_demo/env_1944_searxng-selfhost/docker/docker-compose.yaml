services:
  searxng-selfhost:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: searxng-selfhost-mcp
    ports:
      - "8000:8000"
      - "8888:8888"
    environment:
      - MCP_TRANSPORT=http
      - SEARXNG_URL=http://localhost:8888
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped