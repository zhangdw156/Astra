services:
  three-tier-memory:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: three-tier-memory-mcp
    ports:
      - "8000:8000"
    environment:
      - MCP_TRANSPORT=http
      - WORKSPACE_DIR=/app/workspace
    volumes:
      - memory-data:/app/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  memory-data:

# Usage:
# 1. Build: docker compose -f docker/docker-compose.yaml build
# 2. Start: docker compose -f docker/docker-compose.yaml up -d
# 3. Logs: docker compose -f docker/docker-compose.yaml logs -f
# 4. Stop: docker compose -f docker/docker-compose.yaml down
#
# MCP server: http://localhost:8000