services:
  polymarket-analysis:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: polymarket-analysis-mcp
    ports:
      - "8000:8000"  # MCP Server
      - "8001:8001"  # Gamma Mock API
      - "8002:8002"  # Data Mock API
    environment:
      - MCP_TRANSPORT=http
      - GAMMA_API_BASE=http://localhost:8001
      - DATA_API_BASE=http://localhost:8002
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# Usage:
# 1. Build: docker compose -f docker/docker-compose.yaml build
# 2. Start: docker compose -f docker/docker-compose.yaml up -d
# 3. Logs: docker compose -f docker/docker-compose.yaml logs -f
# 4. Stop: docker compose -f docker/docker-compose.yaml down
#
# MCP endpoint: http://localhost:8000