services:
  initv-data-pods:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: initv-data-pods-mcp
    ports:
      - "8000:8000"
    environment:
      - MCP_TRANSPORT=http
    volumes:
      - pod-data:/root/.openclaw
    restart: unless-stopped

volumes:
  pod-data:

# Usage:
# 1. Build: docker compose -f docker/docker-compose.yaml build
# 2. Start: docker compose -f docker/docker-compose.yaml up -d
# 3. Logs: docker compose -f docker/docker-compose.yaml logs -f
# 4. Stop: docker compose -f docker/docker-compose.yaml down
#
# MCP Server: http://localhost:8000
# Data stored in: ~/.openclaw/data-pods/