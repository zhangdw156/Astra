# 镜像使用 uv 管理依赖（见 Dockerfile）
# 从项目根目录执行: docker compose -f docker/docker-compose.yaml build|up|down
services:
  social-post:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: social-post-mcp
    ports:
      - "8000:8000"  # MCP Server
      - "8003:8003"  # Twitter Mock API
      - "8004:8004"  # Farcaster Mock API
    environment:
      - MCP_TRANSPORT=http
      - TWITTER_API_BASE=http://localhost:8003
      - FARCASTER_API_BASE=http://localhost:8004
      - X_CONSUMER_KEY=mock-consumer-key
      - X_CONSUMER_SECRET=mock-consumer-secret
      - X_ACCESS_TOKEN=mock-access-token
      - X_ACCESS_TOKEN_SECRET=mock-access-secret
      - FARCASTER_API_KEY=mock-api-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# 使用方法:
# 1. 构建镜像: docker compose -f docker/docker-compose.yaml build
# 2. 启动服务: docker compose -f docker/docker-compose.yaml up -d
# 3. 查看日志: docker compose -f docker/docker-compose.yaml logs -f
# 4. 停止服务: docker compose -f docker/docker-compose.yaml down
#
# MCP 服务地址: http://localhost:8000
# 可通过 stdio 或 SSE 模式连接