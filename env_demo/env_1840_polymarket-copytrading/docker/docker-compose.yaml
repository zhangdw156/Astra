services:
  polymarket-copytrading:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: polymarket-copytrading-mcp
    ports:
      - "8000:8000"  # MCP Server
      - "8001:8001"  # Simmer Mock API
    environment:
      - MCP_TRANSPORT=http
      - SIMMER_API_BASE=http://localhost:8001
      - SIMMER_API_KEY=mock-api-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# 使用方法:
# 1. 构建镜像: docker compose -f docker/docker-compose.yaml build
# 2. 启动服务: docker compose -f docker/docker-compose.yaml up -d
# 3. 查看日志: docker compose -f docker/docker-compose.yaml logs -f
# 4. 停止服务: docker compose -f docker/docker-compose.yaml down
#
# MCP 服务地址: http://localhost:8000
# 可通过 stdio 或 SSE 模式连接