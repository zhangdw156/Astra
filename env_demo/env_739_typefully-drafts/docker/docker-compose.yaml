services:
  typefully-drafts:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: typefully-drafts-mcp
    ports:
      - "8000:8000"
      - "8003:8003"
    environment:
      - MCP_TRANSPORT=http
      - TYPEFULLY_API_BASE=http://localhost:8003
      - TYPEFULLY_API_KEY=mock-api-key
      - TYPEFULLY_SOCIAL_SET_ID=123456
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# Usage:
# 1. Build: docker compose -f docker/docker-compose.yaml build
# 2. Start: docker compose -f docker/docker-compose.yaml up -d
# 3. Logs: docker compose -f docker/docker-compose.yaml logs -f
# 4. Stop: docker compose -f docker/docker-compose.yaml down
#
# MCP address: http://localhost:8000