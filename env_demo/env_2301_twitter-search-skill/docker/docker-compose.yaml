services:
  twitter-search:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: twitter-search-mcp
    ports:
      - "8000:8000"
      - "8003:8003"
    environment:
      - MCP_TRANSPORT=http
      - TWITTER_API_BASE=http://localhost:8003
      - TWITTER_API_KEY=mock-api-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# 使用方法:
# 1. 构建镜像: docker compose -f docker/docker-compose.yaml build
# 2. 启动服务: docker compose -f docker/docker-compose.yaml up -d
# 3. 查看日志: docker compose -f docker/docker-compose.yaml logs -f
# 4. 停止服务: docker compose -f docker/docker-compose.yaml down
#
# MCP 服务地址: http://localhost:8000
# Twitter Mock API: http://localhost:8003