services:
  x-voice-match:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: x-voice-match-mcp
    ports:
      - "8000:8000"
    environment:
      - MCP_TRANSPORT=http
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# Usage:
# 1. Build: docker compose -f docker/docker-compose.yaml build
# 2. Start: docker compose -f docker/docker-compose.yaml up -d
# 3. Logs: docker compose -f docker/docker-compose.yaml logs -f
# 4. Stop: docker compose -f docker/docker-compose.yaml down
#
# MCP endpoint: http://localhost:8000 (SSE mode)