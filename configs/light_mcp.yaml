# 轻量 MCP 服务配置：按 tools_path 启动，无需 Docker
#
# 用法（在项目根）：
#   uv run -m astra.scripts.run_light_mcp tools_path=exps/data-synthesis-workflow/opencode_demo/env_2896_prediction-trader/tools.jsonl
#   uv run -m astra.scripts.run_light_mcp tools_path=path/to/skill_tools.jsonl transport=sse

defaults: []

# tools.jsonl 文件路径（必填，运行时可通过 Hydra 覆盖）
tools_path: exps/data-synthesis-workflow/opencode_demo/env_2896_prediction-trader/tools.jsonl

# MCP 服务名称，未填则从 tools_path 父目录名推导
mcp_name: null

# 传输方式：stdio 或 sse
transport: stdio

# 工具回复生成所用的提示词模板路径（相对项目根或绝对路径）
prompt_path: exps/data-synthesis-workflow/prompts/tool_response_generator.md

# 可选：.env 路径，用于 OPENAI_API_KEY 等
env_path: .env

# 可选：工具名 -> 主参 key，用于将 MCP 传来的单一 kwargs 映射到 schema 主参
# 未配置时从 tools.jsonl 的 inputSchema.required[0] 推导
param_normalizer: {}
