# skill_discovery/filter_by_domain 实验配置
# 基于 artifacts/multi_turn_func_doc 领域，用 OpenAI 过滤 skills 目录，只保留覆盖这些领域的 skill
#
# 用法：
#   uv run -m astra.scripts.filter_skills_by_domain              # 默认 dry_run
#   uv run -m astra.scripts.filter_skills_by_domain mode=run
#   uv run -m astra.scripts.filter_skills_by_domain --config-path=exps/skill_discovery --config-name=filter_by_domain mode=run
#
# 需在项目根目录 .env 配置：OPENAI_API_KEY、OPENAI_MODEL，可选 OPENAI_BASE_URL

defaults: []

# 待过滤的 skills 根目录（相对项目根或绝对路径）
skills_dir: skills

# multi_turn_func_doc 所在目录（用于生成领域摘要）
artifacts_func_doc_dir: artifacts/multi_turn_func_doc

# 运行模式：dry_run 仅打印将判定的数量与示例，不调用 API；run 实际调用 LLM 并写保留列表；test 仅处理 1 个 skill 验证流程
mode: dry_run

# 并发请求数（仅 mode=run 时生效）
concurrency: 5
