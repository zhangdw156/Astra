# skill_discovery/collect_scripts 实验配置
# 递归遍历 skillshub，将含可执行 scripts 的目录复制到 skills
#
# 用法：
#   uv run -m astra.scripts.collect_scripts  # 默认 dry_run
#   uv run -m astra.scripts.collect_scripts mode=run
#   uv run -m astra.scripts.collect_scripts --config-path=exps/skill_discovery --config-name=collect_scripts mode=run

defaults: []

# skillshub 根目录（相对项目根或绝对路径，建议从项目根执行）
skillshub_root: skillshub

# skills 输出目录（复制目标）
skills_output: skills

# 运行模式：dry_run 仅打印将执行的操作，run 实际复制
mode: dry_run
