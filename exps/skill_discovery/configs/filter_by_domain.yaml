# skill_discovery/filter_by_domain 实验配置
# 基于 artifacts/multi_turn_func_doc 领域，用 OpenAI 过滤 skills 目录，只保留覆盖这些领域的 skill
#
# 用法：
#   uv run -m astra.scripts.filter_skills_by_domain              # 默认 dry-run
#   uv run -m astra.scripts.filter_skills_by_domain mode=run
#   uv run -m astra.scripts.filter_skills_by_domain --config-path=exps/skill_discovery/configs --config-name=filter_by_domain mode=run
#
# 需在项目根目录 .env 配置：OPENAI_API_KEY、OPENAI_MODEL，可选 OPENAI_BASE_URL

defaults: []

# 待过滤的 skills 根目录（相对项目根或绝对路径）
skills_dir: skills

# 提示词与领域摘要目录（不配置则使用包内 src/astra/scripts/_domain_filter/data，含 domain_summary.txt、filter_system.txt、filter_user.txt）
# prompts_dir: null

# 运行模式：run / test / dry-run（注意 dry-run 必须用中划线）。dry-run 仅打印示例不调用 API；run 实际调用 LLM 并删除不匹配目录；test 随机抽 3 个验证
mode: dry-run

# 判定结果缓存路径（可选）。不配置或为 null 时使用本次 Hydra 输出目录下的 filter_result.json；
# 设为固定路径可跨次运行断点续跑（本实验默认写到 exps/skill_discovery/results/filter_domain_result.json）
filter_result_cache: exps/skill_discovery/results/filter_domain_result.json

# 并发请求数（仅 mode=run 时生效）
concurrency: 32
