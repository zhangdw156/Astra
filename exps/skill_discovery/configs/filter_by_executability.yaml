# skill_discovery/filter_by_executability 实验配置
# 在 docker-only + 可 mock 的前提下，用 LLM 过滤 skills 目录：
# - mode=dry-run：只打印示例，不调用 API
# - mode=test：抽样调用 LLM，但不做删除
# - mode=run：全量调用 LLM，并删除不保留的 skill 目录
#
# 用法：
#   uv run -m astra.scripts.filter_skills_by_executability mode=dry-run
#   uv run -m astra.scripts.filter_skills_by_executability mode=test skills_dir=skills_demo n_test=5
#   uv run -m astra.scripts.filter_skills_by_executability mode=run
#
# 需在项目根目录 .env 配置：OPENAI_API_KEY、OPENAI_MODEL，可选 OPENAI_BASE_URL

defaults: []

# 待过滤的 skills 根目录（相对项目根或绝对路径）
skills_dir: skills

# 提示词目录（不配置则使用包内 src/astra/scripts/_executability_filter/data）
# prompts_dir: null

# 运行模式：run / test / dry-run（注意 dry-run 必须是中划线）
mode: dry-run

# dry-run 打印多少个示例 skill（从 skills_dir 的前 N 个目录选取）
sample_n: 3

# test 模式抽样数量（仅 mode=test 生效）
n_test: 5

# 判定结果缓存路径（NDJSON，每行一个 JSON）。不配置则写入 Hydra 输出目录
filter_result_cache: exps/skill_discovery/results/filter_executability_result.json

# 并发请求数（仅 mode=run/test 时生效）
concurrency: 32

# 给 LLM 的 scripts 概要：最多展示多少个文件、每个文件最多多少字符
scripts_max_files: 3
scripts_max_chars: 8000
