services:
  prediction-trader:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: prediction-trader-mcp
    ports:
      - "8000:8000"
    volumes:
      - ../../../../../.env:/work/.env:ro
      - ../../../prompts:/work/prompts:ro
      - ../src/app:/work/app:ro
    environment:
      - MCP_TRANSPORT=http
      - WORK_DIR=/work
    restart: unless-stopped
