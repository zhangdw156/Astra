name: Feature Request
description: New feature or enhancement
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature and its value to Astra.
  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this solve?
      placeholder: As a ..., I want ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How should it work?
      placeholder: Describe the proposed design or behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Skill Registry
        - Blueprint Engine
        - Execution & Trace
        - Optimization
        - CLI / Config
        - other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches?
    validations:
      required: false
