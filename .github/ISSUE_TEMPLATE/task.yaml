name: Task
description: Development task (issue-driven)
title: "[Task] "
body:
  - type: markdown
    attributes:
      value: |
        Use this for planned work items. Reference design docs or discussions if any.
  - type: input
    id: context
    attributes:
      label: Context / Motivation
      description: Why is this task needed?
      placeholder: e.g., Part of Skill Collection experiment
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done?
      placeholder: |
        - [ ] Step 1
        - [ ] Step 2
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Astra does this touch?
      options:
        - skillshub / skills
        - blueprints / artifacts
        - agent / execution
        - configs / infra
        - docs / tests
        - other
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know it's done?
      placeholder: |
        - Criterion 1
        - Criterion 2
    validations:
      required: false
