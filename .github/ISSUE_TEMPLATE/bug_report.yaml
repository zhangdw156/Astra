name: Bug Report
description: Something isn't working
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Help us fix it by providing clear reproduction steps.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Run `uv run astra ...`
        2. ...
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Python version, OS, etc.
      placeholder: e.g., Python 3.13, macOS
    validations:
      required: false
