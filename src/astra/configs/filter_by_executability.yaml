# 待过滤的 skills 根目录（相对项目根或绝对路径）
skills_dir: skills

# 运行模式：run / test / dry-run
mode: dry-run

# dry-run 打印多少个示例 skill（从 skills_dir 的前 N 个目录选取）
sample_n: 3

# test 模式抽样数量（仅 mode=test 生效）
n_test: 5

filter_result_cache: artifacts/executability_filter_result.json

# 并发请求数（仅 mode=run/test 时生效）
concurrency: 32

# 给 LLM 的 scripts 概要：最多展示多少个文件、每个文件最多多少字符
scripts_max_files: 3
scripts_max_chars: 8000
