# domain 与 executability filter 的结果融合配置

# 输入：前两步过滤的结果（相对项目根或绝对路径）
domain_result: artifacts/domain_filter_result.json
executability_result: artifacts/executability_filter_result.json

# 输出：合并后的 manifest 与汇总
output_manifest: artifacts/skill_manifest.jsonl
# 若为空，则默认使用与 output_manifest 同目录下的 skill_manifest_summary.json
output_summary:

# 可选：为每个 primary_domain 选 top-k 的子集
output_selected:
top_k_per_domain: 0

# 额外屏蔽的 risk flags（会与脚本内 DEFAULT_BLOCKED_RISK_FLAGS 合并）
blocked_risk_flags: []

